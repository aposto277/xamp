<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{url_for('static', filename='/style.css')}}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
</head>
<body>
    <form method="post">
        <input name="login" placeholder="Логин" pattern="[A-Za-z0-9]{6,}" required>
        <input type="password" name="password" placeholder="Пароль" minlength="8" required>
        {% if error %}
            <p>{{ error }}</p>
        {% endif %}
        <button>Войти</button>
    </form>
    <p>Не зарегестрированы?<a href="/registration">Регистрация</a></p>
</body>
</html>
